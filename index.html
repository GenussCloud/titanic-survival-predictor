<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Survival Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-main">
        <h1>🚢 Titanic Survival Prediction</h1>
        <p class="subtitle">Predict passenger survival on the Titanic using Machine Learning</p>

        <form id="predictionForm">
            <!-- Passenger Class -->
            <div class="form-section">
                <div class="section-title">Passenger Information</div>
                
                <div class="form-group">
                    <label for="pclass">Passenger Class</label>
                    <select id="pclass" required>
                        <option value="">-- Select Class --</option>
                        <option value="1">1st Class (Upper)</option>
                        <option value="2">2nd Class (Middle)</option>
                        <option value="3">3rd Class (Lower)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="sex">Gender</label>
                    <select id="sex" required>
                        <option value="">-- Select Gender --</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
            </div>

            <!-- Age and Family -->
            <div class="form-section">
                <div class="section-title">Age & Family Details</div>

                <div class="form-group">
                    <label for="age">Age (years): <span class="range-value" id="age_display">25</span></label>
                    <input type="range" id="age" min="0" max="80" value="25" step="1">
                </div>

                <div class="form-group">
                    <label for="sibsp">Siblings/Spouses Aboard: <span class="range-value" id="sibsp_display">0</span></label>
                    <input type="range" id="sibsp" min="0" max="8" value="0" step="1">
                </div>

                <div class="form-group">
                    <label for="parch">Parents/Children Aboard: <span class="range-value" id="parch_display">0</span></label>
                    <input type="range" id="parch" min="0" max="6" value="0" step="1">
                </div>
            </div>

            <!-- Ticket Information -->
            <div class="form-section">
                <div class="section-title">Ticket Information</div>

                <div class="form-group">
                    <label for="fare">Fare (£): <span class="range-value" id="fare_display">32.20</span></label>
                    <input type="range" id="fare" min="0" max="512" value="32.20" step="0.01">
                </div>

                <div class="form-group">
                    <label for="embarked">Port of Embarkation</label>
                    <select id="embarked" required>
                        <option value="">-- Select Port --</option>
                        <option value="S">Southampton</option>
                        <option value="C">Cherbourg</option>
                        <option value="Q">Queenstown</option>
                    </select>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-container">
                <button type="button" class="btn-predict" onclick="predictSurvival()">Calculate Prediction</button>
                <button type="reset" class="btn-reset">Clear Form</button>
            </div>
        </form>

        <!-- Loading Indicator -->
        <div class="loading" id="loading">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p style="margin-top: 10px;">Processing prediction...</p>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Result Container -->
        <div class="result-container" id="resultContainer">
            <div class="result-title">Prediction Result</div>
            <div class="result-value" id="predictionResult"></div>
            <div class="result-probability">
                Confidence Level:
                <div class="probability-bar">
                    <div class="probability-fill" id="probabilityFill"></div>
                </div>
                <span id="probabilityText"></span>
            </div>
        </div>
    </div>

    <script src="predict.js"></script>
    <script>
        // Update range display values in real-time
        document.getElementById('age').addEventListener('input', function() {
            document.getElementById('age_display').textContent = this.value;
        });
        document.getElementById('sibsp').addEventListener('input', function() {
            document.getElementById('sibsp_display').textContent = this.value;
        });
        document.getElementById('parch').addEventListener('input', function() {
            document.getElementById('parch_display').textContent = this.value;
        });
        document.getElementById('fare').addEventListener('input', function() {
            document.getElementById('fare_display').textContent = parseFloat(this.value).toFixed(2);
        });
    </script>
</body>
</html>
